# Nixpacks / Pxxl — use Root Directory = backend, Port = 4000

[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npx prisma generate", "npm run build"]

[start]
cmd = "sh -c 'npx prisma migrate deploy && (npx prisma db seed || true) && node dist/index.js'"
