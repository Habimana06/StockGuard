# StockGuard — Docker stack (MySQL + API + React)
#
# MySQL credentials (development defaults):
#   ROOT:     user=root        password=root
#   APP:      user=stockguard  password=stockguard  database=stockguard
#
# Backend secrets live in backend/.env — copy from backend/.env.example
#
# First time / after DB change:  docker compose down -v
# Start:                         docker compose up --build
#
# UI: http://localhost:5173   API: http://localhost:4000/health

name: stockguard

services:
  mysql:
    image: mysql:8.4
    container_name: stockguard-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: stockguard
      MYSQL_USER: stockguard
      MYSQL_PASSWORD: stockguard
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - stockguard-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ustockguard", "-pstockguard"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: stockguard-api:local
    container_name: stockguard-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      # Inside Docker the DB host is the service name "mysql", not localhost
      DATABASE_URL: mysql://stockguard:stockguard@mysql:3306/stockguard
      CORS_ORIGIN: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "4000:4000"
    networks:
      - stockguard-net
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
    image: stockguard-web:local
    container_name: stockguard-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"
    networks:
      - stockguard-net

networks:
  stockguard-net:
    driver: bridge

volumes:
  mysql_data:
