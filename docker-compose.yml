# StockGuard — local dev stack (MySQL + API + React UI)
services:
  mysql:
    image: mysql:8.4
    container_name: stockguard-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: stockguard
      MYSQL_USER: stockguard
      MYSQL_PASSWORD: stockguard
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ustockguard", "-pstockguard"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockguard-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: mysql://stockguard:stockguard@mysql:3306/stockguard
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-16-chars-min}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      RESERVATION_TTL_MINUTES: 5
    ports:
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 60s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: stockguard-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  mysql_data:
